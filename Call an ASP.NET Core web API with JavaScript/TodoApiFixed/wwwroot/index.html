<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>To-do CRUD</title>
    <link rel="stylesheet" href="css/site.css" />
  </head>
  <body>
    <h1>To-do CRUD</h1>

    <h3>Add</h3>
    <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
      <input type="text" id="add-name" placeholder="New to-do" />
      <input type="checkbox" id="add-isComplete" />
      <label for="add-isComplete">Is Complete</label>
      <input type="text" id="add-completionDate" placeholder="MM/DD/YYYY" />
      <input type="submit" value="Add" />
    </form>

    <div id="editForm">
      <h3>Edit</h3>
      <form action="javascript:void(0);" onsubmit="updateItem()">
        <input type="hidden" id="edit-id" />
        <input type="text" id="edit-name" placeholder="Task name" />
        <input type="checkbox" id="edit-isComplete" />
        <label for="edit-isComplete">Is Complete</label>
        <input type="text" id="edit-completionDate" placeholder="MM/DD/YYYY" />
        <input type="submit" value="Save" />
        <a onclick="closeInput()" aria-label="Close">&#10006;</a>
      </form>
    </div>

    <p id="counter"></p>

    <table>
      <tr>
        <th>Id</th>
        <th>Is Complete</th>
        <th>Completion Date (MM/DD/YYYY)</th>
        <th>Name</th>
        <th>Actions</th>
      </tr>
      <tbody id="todos"></tbody>
    </table>

    <script src="js/site.js"></script>
  </body>
</html>
